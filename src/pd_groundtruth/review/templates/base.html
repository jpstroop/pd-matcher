<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pd-groundtruth review</title>
  <style>
    :root { --bg: #f7f7f8; --fg: #1d1d1f; --muted: #6b6b70; --line: #e0e0e3;
            --match: #1e7d34; --no: #b3261e; --unsure: #8a6d00; --accent: #2962ff;
            --header-h: 2.65rem; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 15px/1.45 -apple-system, "Segoe UI", system-ui, sans-serif;
           background: var(--bg); color: var(--fg); }
    header { display: flex; align-items: baseline; gap: 1.5rem; padding: .6rem 1.2rem;
             background: #fff; border-bottom: 1px solid var(--line);
             position: sticky; top: 0; z-index: 20; }
    header .tally { color: var(--muted); font-size: .9rem; }
    header a { color: var(--accent); text-decoration: none; }
    main { max-width: 980px; margin: 1.4rem auto; padding: 0 1.2rem; }
    .comparison-grid { display: grid; grid-template-columns: 1fr 1fr;
                        grid-template-rows: auto repeat(9, auto); gap: 0 1rem; }
    .panel { background: #fff; border: 1px solid var(--line); border-radius: 10px;
             padding: 1rem 1.2rem; }
    .comparison-grid > .panel { display: grid; grid-template-rows: subgrid;
                                 grid-row: 1 / -1; align-content: start; }
    .panel h2 { margin: 0 0 .6rem; font-size: .8rem; letter-spacing: .08em;
                text-transform: uppercase; color: var(--muted); }
    .comparison-grid > .panel > .row { min-height: 0; }
    .field { margin: .35rem 0; }
    .comparison-grid > .panel > .row > .field:first-child { margin-top: 0; }
    .comparison-grid > .panel > .row > .field:last-child { margin-bottom: 0; }
    .alt-compare { margin-top: 1.25rem; border: 2px solid #c9a227; border-radius: 6px; padding: 0.75rem 1rem 1rem; }
    .alt-compare-heading { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; margin-bottom: 0.5rem; }
    .alt-compare-heading h2 { margin: 0; }
    .alt-compare-body { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; align-items: start; }
    @media (max-width: 1100px) { .alt-compare-body { grid-template-columns: 1fr; } }
    .field .k { color: var(--muted); font-size: .78rem; }
    .field .v { font-size: .98rem; }
    .v.title { font-weight: 600; font-size: 1.1rem; }
    .renewal { display: inline-block; padding: .1rem .5rem; border-radius: 999px;
               font-size: .78rem; font-weight: 600; }
    .renewal.Renewed { background: #fdecea; color: var(--no); }
    .renewal.Not.renewed, .renewal.notrenewed { background: #e9f6ec; color: var(--match); }
    .renewal.unknown { background: #eee; color: var(--muted); }
    .renewal-details { margin: .6rem 0 .2rem; padding: .55rem .7rem;
                        border: 1px solid var(--line); border-radius: 8px;
                        background: #fafafb; }
    .renewal-details-heading { font-size: .72rem; text-transform: uppercase;
                                letter-spacing: .06em; color: var(--muted);
                                margin-bottom: .3rem; }
    .renewal-meta { display: flex; flex-wrap: wrap; gap: .8rem;
                     font-size: .78rem; color: var(--muted); margin-top: .35rem; }
    .renewal-meta code { background: #eef1ff; color: var(--accent);
                          padding: 0 .35rem; border-radius: 4px; }
    .claimants-diff { color: var(--unsure); font-weight: 700; cursor: help; }
    .nav-row { display: flex; justify-content: space-between; align-items: center;
               margin-bottom: .8rem; min-height: 1.25rem; }
    .nav-row a { color: var(--accent); text-decoration: none; font-size: .9rem; }
    .nav-row a:hover { text-decoration: underline; }
    .nav-back { margin-right: auto; }
    .nav-forward { margin-left: auto; }
    .badge-ebook { display: inline-block; padding: .1rem .5rem; border-radius: 6px;
                   background: #fff3cd; color: #664d03; font-size: .78rem; font-weight: 600; }
    .badge-claimant { display: inline-block; padding: .1rem .5rem; border-radius: 6px;
                      background: #eef1ff; color: var(--accent); font-size: .78rem; font-weight: 600; }
    .badge-translation { display: inline-block; padding: .1rem .5rem; border-radius: 6px;
                         background: #e3f1d4; color: #2d4a00; font-size: .78rem; font-weight: 600; }
    .badge-series { display: inline-block; padding: .1rem .5rem; border-radius: 6px;
                    background: #e6e8ec; color: #4a4a52; font-size: .78rem; font-weight: 600; }
    .audit-note { margin: 0 0 .8rem; padding: .55rem .8rem;
                  background: #eef1ff; border: 1px solid var(--accent);
                  border-radius: 8px; color: var(--fg); font-size: .85rem;
                  font-weight: 600; font-variant-numeric: tabular-nums; }
    .cce-new-matter { font-style: italic; }
    .cce-notes { margin: .2rem 0 0; padding-left: 1.2rem; }
    .cce-notes li { margin: .15rem 0; }
    .above-cards { display: grid;
                   grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
                   gap: .6rem; margin: .35rem 0 .5rem; align-items: stretch; }
    .above-cards-left { display: flex; flex-direction: column;
                         gap: .5rem; min-height: 0; }
    #note-field { flex: 1; width: 100%; min-height: 4rem;
                   padding: .55rem .75rem; font-size: .9rem;
                   border: 1px solid var(--line); border-radius: 10px;
                   background: #fff; font-family: inherit; resize: none;
                   line-height: 1.4; box-sizing: border-box; }
    #note-field:focus { outline: none; border-color: var(--accent);
                         box-shadow: 0 0 0 2px rgba(41, 98, 255, .15); }
    .evidence { margin: 0; padding: .45rem .7rem .55rem;
                background: #fafafa; border: 1px solid var(--line);
                border-radius: 10px; }
    .evidence h2 { margin: 0 0 .35rem; font-weight: 800; line-height: 1; }
    .ev-heading-score { font-size: 1.4rem; color: var(--ink);
                         letter-spacing: -.01em;
                         font-variant-numeric: tabular-nums; }
    .ev-list { list-style: none; margin: 0; padding: 0;
               display: grid; gap: .05rem; }
    .ev-entry { min-width: 0; }
    .ev-row { display: grid;
              grid-template-columns: 130px 1fr auto;
              gap: .55rem; align-items: center;
              font-size: .8rem; line-height: 1.35; }
    .ev-label { white-space: nowrap; overflow: hidden;
                text-overflow: ellipsis; }
    .ev-bar { display: block; width: 100%; background: #ececef;
              border-radius: 4px; height: 6px; overflow: hidden; }
    .ev-fill { display: block; background: var(--accent); height: 100%; min-width: 1px; }
    .ev-score { white-space: nowrap; font-variant-numeric: tabular-nums;
                font-size: .78rem; color: var(--muted); }
    .ev-source-row { padding-left: calc(130px + .55rem); font-size: .7rem;
                     line-height: 1.2; margin: 0 0 .1rem; }
    .ev-source { color: var(--muted); font-style: italic; }
    .card-ids { display: flex; flex-wrap: wrap; gap: .15rem .9rem;
                 align-items: center; font-size: .72rem; color: var(--muted);
                 margin: 1.2rem 0 0; padding: .4rem 0 0;
                 border-top: 1px solid var(--line); }
    .card-ids code { background: #eef1ff; color: var(--accent);
                      padding: 0 .3rem; border-radius: 4px; font-size: .9em; }
    .action-bar { position: sticky; top: var(--header-h); z-index: 10;
                  background: var(--bg); padding: .55rem 1.2rem;
                  border-bottom: 1px solid var(--line);
                  margin: 0 -1.2rem .4rem; }
    .actions { display: flex; gap: .6rem; }
    .actions button { flex: 1; padding: .55rem; font-size: .95rem; font-weight: 600;
                      border: 1px solid var(--line); border-radius: 10px; cursor: pointer; background: #fff; }
    .actions button.match { color: var(--match); }
    .actions button.no { color: var(--no); }
    .actions button.unsure { color: var(--unsure); }
    .actions button.skip { color: var(--muted); }
    .actions button.current { border-width: 2px; background: #eef1ff; box-shadow: inset 0 0 0 1px var(--accent); }
    .actions button.match.current { border-color: var(--match); box-shadow: inset 0 0 0 1px var(--match); background: #e9f6ec; }
    .actions button.no.current { border-color: var(--no); box-shadow: inset 0 0 0 1px var(--no); background: #fdecea; }
    .actions button.unsure.current { border-color: var(--unsure); box-shadow: inset 0 0 0 1px var(--unsure); background: #fff3cd; }
    .category-bar { display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: .2rem .9rem;
                    margin: 0; padding: .45rem .7rem;
                    background: #fafafa; border: 1px solid var(--line);
                    border-radius: 10px; font-size: .8rem; }
    .category-checkbox { display: inline-flex; align-items: center;
                          gap: .35rem; cursor: pointer; color: var(--ink);
                          user-select: none; }
    .category-checkbox input { margin: 0; cursor: pointer; }
    .category-checkbox:hover { color: var(--accent); }
    .hint { color: var(--muted); font-size: .82rem; margin-top: .8rem; }
    table.stats { border-collapse: collapse; width: 100%; }
    table.stats th, table.stats td { text-align: left; padding: .4rem .8rem;
                                     border-bottom: 1px solid var(--line); }
    .big { font-size: 2rem; font-weight: 700; }
    .verdict { display: inline-block; padding: .1rem .55rem; border-radius: 999px;
               font-size: .78rem; font-weight: 600; }
    .verdict-match { background: #e9f6ec; color: var(--match); }
    .verdict-no_match { background: #fdecea; color: var(--no); }
    .verdict-unsure { background: #fff3cd; color: #664d03; }
    table.labels-table { border-collapse: collapse; width: 100%; font-size: .88rem;
                          table-layout: auto; }
    table.labels-table th, table.labels-table td {
      text-align: left; padding: .4rem .55rem; border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    table.labels-table thead th { font-size: .72rem; text-transform: uppercase;
                                  letter-spacing: .06em; color: var(--muted); }
    table.labels-table tbody tr:nth-child(even) { background: #fafafb; }
    table.labels-table tbody tr:hover { background: #eef1ff; }
    table.labels-table a { color: var(--accent); text-decoration: none; }
    table.labels-table a:hover { text-decoration: underline; }
    .note-cell { color: var(--muted); font-size: .82rem; max-width: 28rem; }
    .categories-cell { font-size: .78rem; max-width: 16rem; }
    .category-chip { display: inline-block; padding: .05rem .45rem; margin: .05rem .15rem .05rem 0;
                      border-radius: 999px; background: #eef1ff; color: var(--accent);
                      font-size: .72rem; font-weight: 500; }
    .category-bar-filter { flex-basis: 100%; margin: .35rem 0 0; }
    .filters-bar { display: flex; flex-wrap: wrap; gap: .5rem;
                    align-items: center; margin: .6rem 0 .9rem; }
    .filters-bar select, .filters-bar input[type=text] {
      padding: .35rem .55rem; font: inherit; font-size: .85rem;
      color: var(--fg); background: #fff; border: 1px solid var(--line);
      border-radius: 6px;
    }
    .filters-bar select:focus, .filters-bar input[type=text]:focus {
      outline: none; border-color: var(--fg);
    }
    .filters-bar button,
    .filters-bar a.clear { display: inline-block; box-sizing: border-box;
                            padding: .35rem .9rem; font: inherit;
                            font-size: .85rem; font-weight: 600;
                            line-height: 1.4; border-radius: 6px;
                            border: 1px solid transparent; cursor: pointer;
                            text-decoration: none; }
    .filters-bar button { background: var(--fg); color: #fff;
                            border-color: var(--fg); }
    .filters-bar button:hover { background: #000; border-color: #000; }
    .filters-bar a.clear { background: transparent; color: var(--muted);
                            border-color: var(--line); }
    .filters-bar a.clear:hover { color: var(--fg); border-color: var(--fg); }
    .pair-context { display: inline-flex; flex-wrap: wrap; gap: .4rem;
                     align-items: center;
                     font-size: .8rem; color: var(--muted); }
    .lang-chip, .band { padding: .1rem .45rem; border-radius: 5px;
                         background: #ecedf0; color: var(--fg);
                         font-size: .72rem; font-weight: 600;
                         text-transform: uppercase; letter-spacing: .05em;
                         font-variant-numeric: tabular-nums; }
    .filter-summary { color: var(--muted); }
    .pagination { display: flex; justify-content: flex-end; gap: .8rem;
                   align-items: center; margin-top: .8rem; font-size: .85rem; }
    .pagination a { color: var(--accent); text-decoration: none; }
    .pagination .disabled { color: var(--muted); }
    .pagination-pos { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <strong><a href="/{% if filters %}?{{ filters.query_string() }}{% endif %}">pd-groundtruth review</a></strong>
    {% if card %}
    <span class="tally">pair #<strong>{{ card.pair_id }}</strong></span>
    {% endif %}
    {% if counts %}
    <span class="tally">labeled <strong>{{ counts.labeled }}</strong> / remaining <strong>{{ counts.remaining }}</strong> of {{ counts.total }}</span>
    {% endif %}
    <span class="tally"><a href="/labels">labels</a></span>
    <span class="tally"><a href="/stats{% if filters %}?{{ filters.query_string() }}{% endif %}">stats</a></span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>

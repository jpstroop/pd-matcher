version: "1.0.0"

# Scope: published books only. The pd_matcher project never sees sound
# recordings, architectural works, or unpublished works, so this file
# encodes only the two Cornell categories that apply to MARC book
# records:
#
#   * Category 2 -- works first published in the United States,
#     including the federal-government carve-out.
#   * Category 3 -- works first published outside the United States.
#
# Categories 1 (unpublished), 4 (sound recordings) and 5 (architectural)
# are intentionally absent from both this file and the supporting code.
#
# Ordered list of rules; first match wins. The moving-wall short-circuit
# fires BEFORE this list is consulted, so the pre-95-years cell is
# intentionally absent here: every record whose pub_year is more than 95
# years before today is resolved by the engine without consulting the
# YAML.
#
# Predicate names resolve to callables in pd_matcher.copyright.predicates
# (returning bool) or pd_matcher.copyright.inference (returning
# (bool, assumption) so the assessment surfaces the leap the engine took).

rules:

  # ---------------------------------------------------------------- #
  # Category 2: United States government works.                     #
  # Federal-employee work in official capacity -> PD regardless of  #
  # date. Must run before any US-formality rule because the         #
  # government exemption supersedes notice/renewal/registration.    #
  # ---------------------------------------------------------------- #

  - name: us_government_work
    when:
      - predicate: country_is_us
      - predicate: is_us_government_work
    then: PD_US_GOVERNMENT_WORK
    explanation: >-
      Works prepared by an officer or employee of the US federal
      government as part of their official duties are uncopyrightable
      in the United States (17 U.S.C. Sec. 105).
    assumptions: []

  # ---------------------------------------------------------------- #
  # Category 2: US-published 1931-1977.                              #
  # Three exit doors -- no notice / with notice not renewed / with   #
  # notice and renewed. Order: cheapest / most certain evidence      #
  # first.                                                           #
  # ---------------------------------------------------------------- #

  - name: us_pub_1931_1977_not_registered_no_notice
    when:
      - predicate: country_is_us
      - predicate: published_between
        args: [1931, 1977]
      - predicate: was_registered
        negate: true
    then: PD_US_PUB_NO_NOTICE_1931_1977
    explanation: >-
      US-published 1931-1977 with no surviving NYPL registration;
      under the pre-1989 formality regime publication without notice
      and without registration placed the work in the public domain.
    assumptions:
      - "Assumed no notice: absence of NYPL registration treated as evidence of no notice"

  - name: us_pub_1931_1963_registered_not_renewed
    when:
      - predicate: country_is_us
      - predicate: published_between
        args: [1931, 1963]
      - predicate: has_us_notice
      - predicate: was_registered
      - predicate: was_renewed
        negate: true
    then: PD_US_PUB_REGISTERED_NOT_RENEWED
    explanation: >-
      US-published 1931-1963 with notice (assumed because registered)
      and never renewed during the 28th-year window; the work fell
      into the public domain when its first term expired.
    assumptions: []

  - name: us_pub_1931_1963_registered_and_renewed
    when:
      - predicate: country_is_us
      - predicate: published_between
        args: [1931, 1963]
      - predicate: has_us_notice
      - predicate: was_registered
      - predicate: was_renewed
    then: IN_COPYRIGHT_US_PUB_REGISTERED_AND_RENEWED
    explanation: >-
      US-published 1931-1963 with notice and timely renewal;
      protected for 95 years from the date of publication.
    assumptions: []

  - name: us_pub_1964_1977_with_notice
    when:
      - predicate: country_is_us
      - predicate: published_between
        args: [1964, 1977]
      - predicate: has_us_notice
    then: IN_COPYRIGHT_US_PUB_1964_1977_WITH_NOTICE
    explanation: >-
      US-published 1964-1977 with notice; renewal was automatic for
      this cohort, so the work is protected for 95 years from
      publication.
    assumptions: []

  # ---------------------------------------------------------------- #
  # Category 2: US-published 1978 -- 28 Feb 1989.                    #
  # The five-year cure window for missing notice produces two leaves.#
  # ---------------------------------------------------------------- #

  - name: us_pub_1978_1989_no_registration
    when:
      - predicate: country_is_us
      - predicate: published_between
        args: [1978, 1989]
      - predicate: was_registered
        negate: true
    then: PD_US_PUB_NO_REGISTRATION_1978_1989
    explanation: >-
      US-published between 1 Jan 1978 and 28 Feb 1989 without notice
      and never registered within the five-year cure window; the
      omission was never corrected and the work entered the public
      domain.
    assumptions:
      - "Assumed no notice: absence of NYPL registration within five years treated as no cure"

  - name: us_pub_1978_1989_registered
    when:
      - predicate: country_is_us
      - predicate: published_between
        args: [1978, 1989]
      - predicate: was_registered
    then: IN_COPYRIGHT_US_PUB_1978_1989_CURED
    explanation: >-
      US-published between 1 Jan 1978 and 28 Feb 1989 with a
      surviving registration; even if notice was originally omitted,
      the five-year registration cure preserved the copyright.
    assumptions: []

  # ---------------------------------------------------------------- #
  # Category 2: US-published 1 Mar 1989 onward.                       #
  # Notice is no longer required after Berne implementation.         #
  # ---------------------------------------------------------------- #

  - name: us_pub_post_1989
    when:
      - predicate: country_is_us
      - predicate: published_on_or_after
        args: [1990]
    then: IN_COPYRIGHT_US_PUB_POST_1989
    explanation: >-
      US-published on or after 1 March 1989; notice is no longer a
      condition of copyright. The work is protected for 70 years
      post-mortem auctoris (or 95/120-year corporate terms).
    assumptions: []

  # ---------------------------------------------------------------- #
  # Category 3: Foreign-published works.                             #
  # Order: (1) no-treaty countries, (2) pre-1923 foreign-PD-by-1996  #
  # inference, (3) URAA-restored mid-century works, (4) post-1989    #
  # works, (5) the 31 Dec 2047 floor case, (6) delayed-URAA fallback.#
  # ---------------------------------------------------------------- #

  - name: foreign_no_treaty_country
    when:
      - predicate: country_no_treaty
    then: PD_FOREIGN_NO_TREATY_COUNTRY
    explanation: >-
      First published in a country with no US copyright relations
      (Eritrea, Ethiopia, Iran, Iraq, Marshall Islands, San Marino);
      US copyright never attached.
    assumptions: []

  - name: foreign_pre_1923_pd_home_country_1996
    when:
      - predicate: country_is_foreign
      - predicate: foreign_in_pd_home_country_1996
    then: PD_FOREIGN_IN_HOME_COUNTRY_PD_1996
    explanation: >-
      Foreign work published before 1923 and presumed to have entered
      the public domain in its source country by 1 January 1996;
      URAA did not restore US copyright.
    assumptions: []

  - name: foreign_1931_1977_uraa_restored
    when:
      - predicate: country_is_foreign
      - predicate: published_between
        args: [1931, 1977]
      - predicate: country_delayed_uraa
        negate: true
    then: IN_COPYRIGHT_FOREIGN_URAA_RESTORED
    explanation: >-
      Foreign work first published 1931-1977 in a country whose URAA
      restoration date is 1 January 1996; US copyright was restored
      and runs 95 years from publication.
    assumptions: []

  - name: foreign_1978_2002_pre_1978_creation_floor
    when:
      - predicate: country_is_foreign
      - predicate: published_between
        args: [1978, 2002]
      - predicate: country_no_treaty
        negate: true
      - predicate: country_delayed_uraa
        negate: true
    then: IN_COPYRIGHT_PRE_1978_PUBLISHED_1978_2002_FLOOR
    explanation: >-
      Foreign-published 1978-2002 with a presumed pre-1978 creation
      date: the 31 Dec 2047 floor applies (greater of 70 yr p.m.a.
      or the floor).
    assumptions:
      - "Assumed pre-1978 creation: applied 31 Dec 2047 floor for foreign 1978-2002 publication"

  - name: foreign_post_1989_with_relations
    when:
      - predicate: country_is_foreign
      - predicate: published_on_or_after
        args: [2003]
      - predicate: country_no_treaty
        negate: true
      - predicate: country_delayed_uraa
        negate: true
    then: IN_COPYRIGHT_FOREIGN_POST_1989
    explanation: >-
      Foreign work first published on or after 1 January 2003 in a
      country with US copyright relations; protected for 70 years
      post-mortem auctoris (or corporate terms).
    assumptions: []

  - name: foreign_delayed_uraa_insufficient_data
    when:
      - predicate: country_is_foreign
      - predicate: country_delayed_uraa
    then: UNKNOWN_INSUFFICIENT_DATA
    explanation: >-
      First published in a country with a delayed Berne/WTO accession
      (Afghanistan, Andorra, Bhutan, etc.); a definitive answer
      requires the country-specific restoration date which is out of
      scope for this ruleset.
    assumptions:
      - "Insufficient data: delayed-URAA country requires accession-specific lookup"
